<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>DeltaChat Changelogs (fan-made)</title>
<style>
  :root { --bg:#15171b; --panel:#1d2026; --line:#2c313a; --fg:#e6e8eb; --muted:#9aa3af; --accent:#3793ff; }
  * { box-sizing:border-box; }
  body { margin:0; font:15px/1.55 system-ui,sans-serif; background:var(--bg); color:var(--fg);
         height:100vh; display:flex; flex-direction:column; overflow:hidden; }
  header { flex:none; display:flex; flex-wrap:wrap; justify-content:space-between; align-items:flex-start;
           gap:10px 16px; padding:10px 16px; border-bottom:1px solid var(--line); }
  header h1 { margin:0 0 3px; font-size:16px; font-weight:600; }
  header h1 .tag { color:var(--muted); font-weight:400; }
  header p { margin:0; max-width:820px; color:var(--muted); font-size:12.5px; line-height:1.45; }
  .actions { display:flex; gap:8px; flex:none; }
  .actions a { color:var(--muted); text-decoration:none; font-size:12px; cursor:pointer;
               border:1px solid var(--line); padding:4px 9px; border-radius:7px; white-space:nowrap; }
  .actions a:hover { color:var(--fg); border-color:var(--accent); }
  .actions a.viewtoggle { color:var(--accent); border-color:var(--accent); }
  nav { flex:none; display:flex; gap:6px; flex-wrap:wrap; padding:10px 16px; border-bottom:1px solid var(--line); }
  .tab { display:flex; align-items:center; gap:7px; padding:6px 11px; border:1px solid var(--line);
         border-radius:8px; background:var(--panel); color:var(--fg); cursor:pointer; font-size:13px;
         text-decoration:none; }
  .tab img { width:18px; height:18px; border-radius:4px; object-fit:contain; }
  .tab img.tint { filter: brightness(0) invert(1); } /* dark theme: make a low-contrast logo white */
  .tab.active { border-color:var(--accent); color:#fff; }
  .sep { width:1px; align-self:stretch; background:var(--line); margin:0 5px; }
  .tab.navbtn { color:var(--fg); font-weight:600; }
  .layout { display:flex; flex:1; min-height:0; }
  aside { width:230px; flex:none; overflow:auto; border-right:1px solid var(--line); padding:10px; }
  .side-head { display:flex; align-items:center; justify-content:space-between; margin:2px 4px 8px; }
  .side-head span { font-size:11px; text-transform:uppercase; letter-spacing:.05em; color:var(--muted); }
  .toggle { background:none; border:1px solid var(--line); color:var(--muted); border-radius:6px;
            font-size:11px; padding:2px 7px; cursor:pointer; }
  .toggle.on { color:var(--accent); border-color:var(--accent); }
  #search { width:100%; padding:5px 8px; margin-bottom:6px; background:var(--panel);
            border:1px solid var(--line); border-radius:6px; color:var(--fg); font-size:13px; }
  .yr { font-size:11px; font-weight:700; color:var(--muted); margin:11px 6px 3px; letter-spacing:.04em; }
  aside a { display:flex; justify-content:space-between; gap:8px; align-items:baseline;
            padding:3px 6px; color:var(--muted); text-decoration:none; border-radius:5px;
            border-left:2px solid transparent; }
  aside a:hover { background:var(--panel); color:var(--fg); }
  aside a.active { background:var(--panel); color:#fff; border-left-color:var(--accent); }
  aside a .ver { font-size:13px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  aside a .date { color:var(--muted); font-size:11px; white-space:nowrap; flex:none; }
  main { flex:1; overflow:auto; padding:8px 26px 60px; }
  #linkbar { display:flex; align-items:center; gap:10px; flex-wrap:wrap; padding:6px 2px 8px;
             border-bottom:1px solid var(--line); }
  #linkbar:empty { display:none; }
  #linkbar a { color:var(--muted); text-decoration:none; font-size:13px; }
  #linkbar a:hover { color:var(--fg); }
  #linkbar a.donate { color:var(--accent); }
  #linkbar .dot { color:var(--line); }
  main h1 { font-size:22px; }
  main h2 { font-size:18px; margin-top:1.6em; padding-top:8px; border-top:1px solid var(--line); scroll-margin-top:12px; }
  main h3 { font-size:14px; color:var(--muted); }
  main a { color:var(--accent); }
  main code { background:var(--panel); padding:1px 4px; border-radius:4px; font-size:.9em; }
  main pre { background:var(--panel); padding:10px; border-radius:8px; overflow:auto; }
  .status { color:var(--muted); padding:20px 2px; }
  .status.err { color:#ff6b6b; }
</style>
</head>
<body>
<header>
  <div>
    <h1 id="title"></h1>
    <p id="subtitle"></p>
  </div>
  <div class="actions">
    <a id="viewtoggle" class="viewtoggle"></a>
    <a href="https://github.com/experintellia/deltachat-changelogs" target="_blank" rel="noopener"
       title="Source code of this viewer page (not the changelogs)">Page source ↗</a>
  </div>
</header>
<nav id="tabs"></nav>
<div class="layout">
  <aside>
    <div class="side-head"><span>Versions</span>
      <button id="reltoggle" class="toggle" title="Toggle relative dates">rel date</button></div>
    <input id="search" type="search" placeholder="filter versions…" autocomplete="off">
    <div id="toc"></div>
  </aside>
  <main><div id="linkbar"></div><div id="content" class="status">Loading…</div></main>
</div>

<script src="marked.min.js"></script>
<script src="normalize.js"></script>
<script>
const DC = "https://github.com/deltachat.png";
const DELTA_DONATE = "https://delta.chat/donate";
const CHATMAIL_DONATE = "https://opencollective.com/chatmail";
const PROJECTS = [
  { id:"desktop", label:"Desktop", type:"md", logo:DC,
    site:"https://delta.chat", repo:"https://github.com/deltachat/deltachat-desktop", donate:DELTA_DONATE,
    url:"https://raw.githubusercontent.com/deltachat/deltachat-desktop/main/CHANGELOG.md" },
  { id:"android", label:"Android", type:"md", logo:DC,
    site:"https://delta.chat", repo:"https://github.com/deltachat/deltachat-android", donate:DELTA_DONATE,
    url:"https://raw.githubusercontent.com/deltachat/deltachat-android/main/CHANGELOG.md" },
  { id:"ios", label:"iOS", type:"md", logo:DC,
    site:"https://delta.chat", repo:"https://github.com/deltachat/deltachat-ios", donate:DELTA_DONATE,
    url:"https://raw.githubusercontent.com/deltachat/deltachat-ios/main/CHANGELOG.md" },
  { id:"deltatouch", label:"DeltaTouch", type:"text",
    logo:"https://codeberg.org/lk108/deltatouch/raw/branch/main/assets/deltatouch.svg",
    repo:"https://codeberg.org/lk108/deltatouch",
    url:"https://codeberg.org/api/v1/repos/lk108/deltatouch/media/CHANGELOG" },
  { id:"parla", label:"Parla", type:"appdata",
    logo:"https://raw.githubusercontent.com/trufae/parla/main/parla.svg",
    repo:"https://github.com/trufae/parla",
    url:"https://raw.githubusercontent.com/trufae/parla/main/data/io.github.trufae.Parla.appdata.xml" },
  { sep:true }, // chatmail: core + relay
  { id:"core", label:"Core", type:"md", logo:"https://chatmail.at/assets/logos/chatmail.svg", tint:true,
    site:"https://chatmail.at", repo:"https://github.com/deltachat/deltachat-core-rust", donate:CHATMAIL_DONATE,
    url:"https://raw.githubusercontent.com/deltachat/deltachat-core-rust/main/CHANGELOG.md" },
  { id:"relay", label:"Chatmail Relay", type:"md", logo:"https://github.com/chatmail.png",
    site:"https://chatmail.at", repo:"https://github.com/chatmail/relay", donate:CHATMAIL_DONATE,
    url:"https://raw.githubusercontent.com/chatmail/relay/main/CHANGELOG.md" },
];

// Forks live on a separate view. Arcane's android app keeps no own changelog beyond the
// upstream copy it tracks (CHANGELOG-upstream.md); its core fork has its own CHANGELOG.md.
const ARCANE_DONATE = "https://arcanechat.me/#contribute";
const FORKS = [
  { id:"arcane-android", label:"Arcane · Android", type:"md", logo:"https://github.com/ArcaneChat.png",
    site:"https://arcanechat.me", repo:"https://github.com/ArcaneChat/android", donate:ARCANE_DONATE,
    url:"https://raw.githubusercontent.com/ArcaneChat/android/main/CHANGELOG-upstream.md" },
  { id:"arcane-core", label:"Arcane · Core", type:"md", logo:"https://github.com/ArcaneChat.png",
    site:"https://arcanechat.me", repo:"https://github.com/ArcaneChat/core", donate:ARCANE_DONATE,
    url:"https://raw.githubusercontent.com/ArcaneChat/core/main/CHANGELOG.md" },
];

const byId = id => [...PROJECTS, ...FORKS].find(p => p.id === id);
const viewOf = id => FORKS.some(f => f.id === id) ? "forks" : "main";

const cache = {};
let entries = [];      // [{i, ver, date, raw}]
let relative = false;
let activeId = null;
let spy = null;
let curId = PROJECTS[0].id;

const tabsEl = document.getElementById("tabs");
const tocEl = document.getElementById("toc");
const contentEl = document.getElementById("content");
const linkbarEl = document.getElementById("linkbar");
const mainEl = document.querySelector("main");
const searchEl = document.getElementById("search");
const relBtn = document.getElementById("reltoggle");
const titleEl = document.getElementById("title");
const subEl = document.getElementById("subtitle");
const toggleEl = document.getElementById("viewtoggle");

// --- tabs as real links: native modifier-click (new tab/window) just works ---
function go(id) { // normal in-page navigation to a tab
  return e => {
    if (e.metaKey || e.ctrlKey || e.shiftKey || e.button !== 0) return; // let browser open new tab/window
    e.preventDefault();
    history.pushState({}, "", "?p=" + id);
    show(id);
  };
}
function mkTab(p) {
  const a = document.createElement("a");
  a.className = "tab"; a.id = "tab-" + p.id; a.href = "?p=" + p.id;
  a.innerHTML = `<img alt="" class="${p.tint ? "tint" : ""}" src="${p.logo}" onerror="this.remove()"><span>${p.label}</span>`;
  a.onclick = go(p.id);
  return a;
}
// Build the tab bar for the current view. The view switch lives in the header.
function renderTabs(view) {
  tabsEl.innerHTML = "";
  (view === "forks" ? FORKS : PROJECTS).forEach(p => {
    if (p.sep) { const s = document.createElement("span"); s.className = "sep"; tabsEl.appendChild(s); return; }
    tabsEl.appendChild(mkTab(p));
  });
}

// Header title, intro text, and the view-switch button — all change with the view.
const VIEW_META = {
  main: {
    title: 'DeltaChat Changelogs <span class="tag">· fan-made unofficial viewer</span>',
    sub: 'Official Delta Chat &amp; chatmail clients, plus community clients that aim to follow the official ones fairly closely. Pulled live from GitHub &amp; Codeberg.',
    toggle: 'Forks →', target: () => FORKS[0].id,
  },
  forks: {
    title: 'DeltaChat Forks <span class="tag">· fan-made unofficial viewer</span>',
    sub: 'Forks add new features and make different decisions in some areas. Sometimes those features are later taken up by the official/upstream project. Pulled live.',
    toggle: '← Clients & community', target: () => PROJECTS[0].id,
  },
};
function applyView(view) {
  const m = VIEW_META[view], t = m.target();
  titleEl.innerHTML = m.title;
  subEl.innerHTML = m.sub;
  toggleEl.textContent = m.toggle;
  toggleEl.href = "?p=" + t;
  toggleEl.onclick = go(t);
  document.title = view === "forks" ? "DeltaChat Forks" : "DeltaChat Changelogs";
}
window.onpopstate = () => show(currentId());
searchEl.oninput = renderSidebar;
relBtn.onclick = () => {
  relative = !relative;
  relBtn.classList.toggle("on", relative);
  relBtn.textContent = relative ? "abs date" : "rel date";
  renderSidebar();
};

function currentId() {
  const id = new URLSearchParams(location.search).get("p");
  return byId(id) ? id : PROJECTS[0].id;
}

// A) extract version + date from a heading, whatever the source format.
// Date may be full (2026-06-23) or year-month only (2026-06, android/ios).
const DATE_RE = /\d{4}-\d{2}(?:-\d{2})?/;
function parseHeading(text) {
  const ver = (text.match(/\d+\.\d+(?:\.\d+)?/) || [])[0] || text.trim();
  const date = (text.match(DATE_RE) || [])[0] || null;
  return { ver, date, raw: text.trim() };
}

function fmtDate(d) {
  const full = d.length === 10;
  const dt = new Date((full ? d : d + "-01") + "T00:00:00");
  if (relative) {
    const days = Math.round((Date.now() - dt) / 864e5);
    if (days <= 0) return "today";
    if (days < 30) return days + "d ago";
    if (days < 365) return Math.round(days / 30) + "mo ago";
    return Math.round(days / 365) + "y ago";
  }
  // F) year lives in the sidebar sub-header, so drop it here: long month (+ day if known).
  return dt.toLocaleDateString(undefined, full ? { month: "long", day: "numeric" } : { month: "long" });
}

// Per-project link bar above the changelog: website · repo · donate (each optional).
function renderLinkbar(p) {
  const link = (href, text, cls) =>
    `<a href="${href}" target="_blank" rel="noopener"${cls ? ` class="${cls}"` : ""}>${text}</a>`;
  const parts = [];
  if (p.site) parts.push(link(p.site, "Website"));
  if (p.repo) parts.push(link(p.repo, "Repository"));
  if (p.donate) parts.push(link(p.donate, "♥ Donate", "donate"));
  linkbarEl.innerHTML = parts.join('<span class="dot">·</span>');
}

async function show(id) {
  const p = byId(id);
  curId = id;
  const view = viewOf(id);
  applyView(view);
  renderTabs(view);
  document.getElementById("tab-" + id).classList.add("active");
  renderLinkbar(p);
  searchEl.value = "";
  activeId = null;
  tocEl.innerHTML = "";
  contentEl.className = "status"; contentEl.textContent = "Loading " + p.label + "…";
  try {
    if (!cache[id]) {
      const res = await fetch(p.url);
      if (!res.ok) throw new Error("HTTP " + res.status);
      cache[id] = await res.text();
    }
    contentEl.className = "";
    contentEl.innerHTML = marked.parse(toMarkdown(p.type, cache[id]));
    entries = [...contentEl.querySelectorAll("h2")].map((h, i) => {
      h.id = "v-" + i;
      const e = parseHeading(h.textContent);
      if (!e.date) { // android/ios: date sits in the paragraph right below the heading
        const m = (h.nextElementSibling?.textContent.trim() || "").match(new RegExp("^" + DATE_RE.source));
        if (m) e.date = m[0];
      }
      return { i, ...e };
    });
    renderSidebar();
    setupSpy();
    if (location.hash) { const t = contentEl.querySelector(location.hash); if (t) t.scrollIntoView(); }
  } catch (e) {
    contentEl.className = "status err";
    contentEl.textContent = "Failed to load " + p.label + ": " + e.message;
  }
}

// C) filter + F) year groups, built from the parsed entries.
function renderSidebar() {
  const q = searchEl.value.toLowerCase().trim();
  tocEl.innerHTML = "";
  let curYear = null;
  for (const en of entries) {
    if (q && !(en.ver + " " + (en.date || "") + " " + en.raw).toLowerCase().includes(q)) continue;
    const year = en.date ? en.date.slice(0, 4) : null;
    if (year && year !== curYear) {
      curYear = year;
      const h = document.createElement("div"); h.className = "yr"; h.textContent = year;
      tocEl.appendChild(h);
    }
    const a = document.createElement("a");
    a.href = `?p=${curId}#v-${en.i}`;
    a.dataset.id = "v-" + en.i;
    a.innerHTML = `<span class="ver"></span>` + (en.date ? `<span class="date"></span>` : "");
    a.querySelector(".ver").textContent = en.ver;
    if (en.date) a.querySelector(".date").textContent = fmtDate(en.date);
    tocEl.appendChild(a);
  }
  if (activeId) setActive(activeId);
}

// D) scroll-spy: highlight the version currently near the top of the content.
function setupSpy() {
  if (spy) spy.disconnect();
  const hs = [...contentEl.querySelectorAll("h2")];
  spy = new IntersectionObserver(es => {
    es.forEach(e => e.target._vis = e.isIntersecting);
    const cur = hs.find(h => h._vis);
    if (cur) setActive(cur.id);
  }, { root: mainEl, rootMargin: "0px 0px -75% 0px", threshold: 0 });
  hs.forEach(h => spy.observe(h));
}

function setActive(id) {
  activeId = id;
  let cur = null;
  tocEl.querySelectorAll("a").forEach(a => {
    const on = a.dataset.id === id;
    a.classList.toggle("active", on);
    if (on) cur = a;
  });
  if (cur) cur.scrollIntoView({ block: "nearest" });
}

show(currentId());
</script>
</body>
</html>
